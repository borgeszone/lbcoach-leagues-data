name: Scrape leagues data

on:
  # Semanal: cada lunes a las 06:00 UTC. Granularidad fin-a-fin con la app
  # ≤14 días (cron 7d + caché de LeaguesService 7d). Captura cambios de
  # ligas que se confirman tarde, bajas mid-season, renombrados, etc.
  schedule:
    - cron: '0 6 * * 1'
  # Manual: trigger desde la pestaña Actions
  workflow_dispatch:
    inputs:
      season:
        description: 'Temporada (formato YYYY-YYYY). Vacío = auto-detectar según fecha actual.'
        required: false
        default: ''
      no_badges:
        description: 'Saltar resolución de escudos via Wikipedia'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.season }}" ]; then
            ARGS="--season ${{ github.event.inputs.season }}"
          fi
          if [ "${{ github.event.inputs.no_badges }}" = "true" ]; then
            ARGS="$ARGS --no-badges"
          fi
          python scrape.py $ARGS

      - name: Show diff
        run: |
          echo "=== output/leagues.json ==="
          head -40 output/leagues.json
          echo "..."
          wc -l output/leagues.json

      # Persistir las cachés acumulativas (escudos + actaUrls) de vuelta a main.
      # Sin este commit el scraper regeneraba desde cero en cada run y las
      # cachés nunca acumulaban — el archivo en disco se tiraba con el container.
      - name: Commit caches back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Solo committeamos cambios en los ficheros de caché. El resto del repo
          # queda intacto.
          git add data/badges-cache.json data/calendar-cache.json
          if git diff --cached --quiet; then
            echo "Sin cambios en las cachés"
          else
            git commit -m "chore: refresh data caches [skip ci]"
            git push origin main
          fi

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: false
          commit_message: 'chore: refresh leagues.json'
